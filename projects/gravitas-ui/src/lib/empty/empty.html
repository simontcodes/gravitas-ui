<div class="gv-empty__container">
  <div class="gv-empty__content">
    <!-- Icon / visual (optional slot later if needed) -->
    <div class="gv-empty__icon" aria-hidden="true">
      <div class="gv-empty__icon-inner"></div>
    </div>

    <!-- Text -->
    <div class="gv-empty__text">
      @if (title?.trim()) {
        <div class="gv-empty__title">{{ title }}</div>
      }

      @if (description?.trim()) {
        <div class="gv-empty__description">
          {{ description }}
        </div>
      }
    </div>

    <!-- Actions -->
    <div class="gv-empty__actions">
      <ng-content select="[gvEmptyActions]"></ng-content>
    </div>
  </div>
</div>
