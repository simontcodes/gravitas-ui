<gv-form-field
  [label]="label || null"
  [description]="description || null"
  [required]="required"
  [helperText]="!errorText ? helperText || null : null"
  [error]="errorText || null"
  [controlId]="inputId"
  [fullWidth]="true"
>
  <div class="gv-textarea__control">
    <textarea
      class="gv-textarea__field"
      [id]="inputId"
      [name]="name || null"
      [value]="value"
      [rows]="rows"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [required]="required"
      [readOnly]="readonly"
      [maxLength]="maxLength ?? null"
      [attr.aria-invalid]="errorText ? 'true' : null"
      [attr.aria-describedby]="describedBy"
      (input)="handleInput($event)"
      (focus)="handleFocus()"
      (blur)="handleBlur()"
    ></textarea>
  </div>

  @if (maxLength) {
    <div class="gv-textarea__meta">
      @if (maxLength) {
        <div class="gv-textarea__count" [id]="inputId + '-count'">{{ characterCount }}/{{ maxLength }}</div>
      }
    </div>
  }
</gv-form-field>
