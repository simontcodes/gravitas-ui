<div class="gv-loader__content" role="status" aria-live="polite" [attr.aria-label]="ariaLabel">
  @if (variant === 'spinner') {
    <span class="gv-loader__spinner" aria-hidden="true"></span>
  }

  @if (variant === 'dots') {
    <span class="gv-loader__dots" aria-hidden="true">
      @for (dot of dots; track $index) {
        <span class="gv-loader__dot"></span>
      }
    </span>
  }

  @if (showVisibleLabel) {
    <span class="gv-loader__label">{{ label }}</span>
  } @else {
    <span class="visually-hidden">{{ ariaLabel }}</span>
  }
</div>
