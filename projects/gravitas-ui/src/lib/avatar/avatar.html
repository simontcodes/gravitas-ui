<div class="gv-avatar" [attr.aria-label]="computedAlt">
  @if (hasImage) {
    <img class="gv-avatar__image" [src]="src!" [alt]="computedAlt" (error)="onImageError()" />
  } @else if (shouldShowInitials) {
    <span class="gv-avatar__initials">{{ displayInitials }}</span>
  } @else {
    <span class="gv-avatar__icon">
      <ng-content>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" class="gv-avatar__default-icon">
          <path
            d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 20C4.8 17.2 7.6 15 12 15C16.4 15 19.2 17.2 20 20"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </ng-content>
    </span>
  }
</div>
