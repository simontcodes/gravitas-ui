<label class="gv-switch" [attr.for]="inputId">
  <span class="gv-switch__control">
    <input
      class="gv-switch__input"
      type="checkbox"
      [id]="inputId"
      [name]="name || null"
      [checked]="checked"
      [disabled]="disabled"
      [required]="required"
      [attr.role]="'switch'"
      [attr.aria-checked]="checked"
      [attr.aria-invalid]="errorText ? 'true' : null"
      [attr.aria-describedby]="description || helperText || errorText ? inputId + '-meta' : null"
      (change)="handleInputChange($event)"
      (focus)="handleFocus()"
      (blur)="handleBlur()"
    />

    <span class="gv-switch__track" aria-hidden="true">
      <span class="gv-switch__thumb"></span>
    </span>
  </span>

  <span class="gv-switch__content">
    @if (label) {
      <span class="gv-switch__label">
        {{ label }}
        @if (required) {
          <span class="gv-switch__required" aria-hidden="true">*</span>
        }
      </span>
    }

    @if (description || helperText || errorText) {
      <span class="gv-switch__meta" [id]="inputId + '-meta'">
        @if (errorText) {
          <span class="gv-switch__error-text">{{ errorText }}</span>
        } @else {
          @if (description) {
            <span class="gv-switch__description">{{ description }}</span>
          }
          @if (helperText) {
            <span class="gv-switch__helper-text">{{ helperText }}</span>
          }
        }
      </span>
    }
  </span>
</label>
